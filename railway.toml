[build]
builder = "nixpacks"
buildCommand = "npm install && cd client && npm run build && cd ../server && npm run build"

[deploy]
startCommand = "npx prisma migrate deploy --schema server/prisma/schema.prisma && node server/dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
