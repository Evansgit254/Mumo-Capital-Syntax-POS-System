name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    name: Lint & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npm run prisma:generate --workspace=server

      - name: Lint
        run: npm run lint

      - name: Build All
        run: npm run build

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npm run prisma:generate --workspace=server

      - name: Run Backend Tests
        run: npm test --workspace=server
        env:
          JWT_SECRET: test-secret
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mumo_test?schema=public

  # Placeholder for CD - can be extended based on hosting provider
